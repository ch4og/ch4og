name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - name: Markdown
        uses: lowlighter/metrics@latest
        with:
          template: markdown
          plugin_languages: yes
          filename: README.md
          markdown: >-
            https://raw.githubusercontent.com/ch4og/ch4og/main/template.md
          config_output: markdown
          token: ${{ secrets.METRICS_TOKEN }}
          
      - name: Wakatime
        uses: lowlighter/metrics@latest
        with:
          filename: .cache/wakatime.svg
          token: NOT_NEEDED
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: time, languages, languages-graphs, editors, os
          plugin_wakatime_languages_ignored: unknown
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_url: https://wakapi.dev
          plugin_wakatime_days: 365
          plugin_wakatime_limit: 20
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: .cache/languages.svg
          base: ""
          token: ${{ secrets.METRICS_TOKEN }}
          plugin_languages: yes
          plugin_languages_indepth: yes

